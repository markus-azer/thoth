name: Actionlint

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: actionlint-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  actionlint:
    runs-on: ubuntu-24.04
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v6
      - uses: reviewdog/action-actionlint@v1
        with:
          reporter: github-check
          filter_mode: nofilter
          fail_level: error