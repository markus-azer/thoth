name: Copilot Review Gate

on:
  pull_request:
    types: [opened, reopened, synchronize]
  pull_request_review:
    types: [submitted, dismissed]

permissions:
  statuses: write

jobs:
  gate:
    # Run for PR events, review dismissals, or a Copilot review of the current head.
    # TODO: also flip to success on human approval so a real reviewer can override.
    if: >-
      github.event_name == 'pull_request' ||
      (github.event.review.user.type == 'Bot' &&
       github.event.review.user.login == 'copilot-pull-request-reviewer[bot]' &&
       (github.event.action == 'dismissed' ||
        (github.event.action == 'submitted' &&
         github.event.review.commit_id == github.event.pull_request.head.sha)))
    runs-on: ubuntu-24.04
    timeout-minutes: 2
    steps:
      - env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.event.pull_request.head.sha }}
          STATE: ${{ github.event.action == 'submitted' && 'success' || 'pending' }}
        run: gh api "repos/$REPO/statuses/$SHA" -f state="$STATE" -f context=copilot/reviewed -f description="Copilot review"
