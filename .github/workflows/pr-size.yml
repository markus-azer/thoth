name: PR Size

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write

jobs:
  pr-size:
    runs-on: ubuntu-24.04
    timeout-minutes: 2
    steps:
      - uses: codelytv/pr-size-labeler@v1
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          xs_label: 'size/xs'
          s_label: 'size/s'
          m_label: 'size/m'
          l_label: 'size/l'
          xl_label: 'size/xl'
          xs_max_size: 10
          s_max_size: 100
          m_max_size: 400
          l_max_size: 800
          fail_if_xl: true
          message_if_xl: |
            This PR exceeds 800 LOC. Split into smaller PRs (target <400 LOC).
            Lockfiles and generated files don't count.
          files_to_ignore: |
            pnpm-lock.yaml
            .terraform.lock.hcl
