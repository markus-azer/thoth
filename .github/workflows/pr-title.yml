name: PR Title

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: read

jobs:
  pr-title:
    runs-on: ubuntu-24.04
    timeout-minutes: 2
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Mirrors commitlint type-enum in commitlint.config.cjs
          types: |
            spec
            test
            feat
            fix
            chore
            docs
            refactor
            perf
            style
            build
            ci
            infra
            revert
          requireScope: false
          subjectPattern: ^[a-z].+[^.]$
          subjectPatternError: |
            PR title subject must start lowercase and not end with a period.
            Example: "feat(http): welcome route"
