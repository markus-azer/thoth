name: Zizmor

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: zizmor-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  zizmor:
    runs-on: ubuntu-24.04
    timeout-minutes: 2
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      # Uploads SARIF to the Security tab. Free for public repos via GitHub Advanced Security.
      - uses: zizmorcore/zizmor-action@192e21d79ab29983730a13d1382995c2307fbcaa # v0.5.7
