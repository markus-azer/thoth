name: Zizmor

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: zizmor-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  zizmor:
    runs-on: ubuntu-24.04
    timeout-minutes: 2
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      # Uploads SARIF to the Security tab. Free for public repos via GitHub Advanced Security.
      - uses: zizmorcore/zizmor-action@192e21d79ab29983730a13d1382995c2307fbcaa # v0.5.7
