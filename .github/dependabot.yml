version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    versioning-strategy: increase
    cooldown:
      default-days: 7
    groups:
      dev-tools:
        patterns:
          - "@biomejs/*"
          - "@commitlint/*"
          - "secretlint"
          - "@secretlint/*"
          - "husky"
          - "lint-staged"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    cooldown:
      default-days: 7

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 2
    cooldown:
      default-days: 7
