services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: thoth
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 10

  flyway:
    image: flyway/flyway:11
    command: -connectRetries=10 migrate
    environment:
      FLYWAY_URL: jdbc:postgresql://postgres:5432/thoth
      FLYWAY_USER: postgres
      FLYWAY_PASSWORD: postgres
    volumes:
      - ./apps/api/sql:/flyway/sql:ro
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: dev
    ports:
      - "3002:3002"
      - "9090:9090"
    depends_on:
      postgres:
        condition: service_healthy
      flyway:
        condition: service_completed_successfully
    env_file: apps/api/.env
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/thoth
    develop:
      watch:
        - action: sync
          path: apps/api
          target: /app/apps/api
          ignore:
            - "**/node_modules"
            - "**/dist"
        - action: rebuild
          path: pnpm-lock.yaml
