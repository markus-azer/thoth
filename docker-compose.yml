services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: wadjet
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: dev
    ports:
      - "3002:3002"
      - "9090:9090"
    depends_on:
      postgres:
        condition: service_healthy
    env_file: apps/api/.env
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/wadjet
    develop:
      watch:
        - action: sync
          path: .
          target: /app
          ignore:
            - "**/node_modules"
            - "**/dist"
        - action: rebuild
          path: pnpm-lock.yaml
